name: Sync changelogs to chatlab.fun

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'changelogs/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ChatLab
        uses: actions/checkout@v4
        with:
          sparse-checkout: changelogs

      - name: Checkout chatlab.fun
        uses: actions/checkout@v4
        with:
          repository: hellodigua/chatlab.fun
          token: ${{ secrets.CHATLAB_FUN_TOKEN }}
          path: chatlab-fun

      - name: Sync changelogs
        run: |
          rsync -av --delete \
            changelogs/ chatlab-fun/public/changelogs/

      - name: Commit and push
        id: push
        working-directory: chatlab-fun
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/changelogs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "sync: update changelogs from ChatLab@${GITHUB_SHA::7}"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger EdgeOne deploy
        if: steps.push.outputs.pushed == 'true'
        run: curl -s -X POST "${{ secrets.WEBSITE_DEPLOY_HOOK_URL }}"
